<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>ゲーム選定ツール</title>
<style>
  :root{
    --bg:#12101a; --panel:#1b1826; --panel2:#211d30; --line:#312b45;
    --ink:#e8e4f0; --sub:#9a93b0; --faint:#6b6482;
    --amber:#ffb347;
    --rS:#ffb347; --rA:#e05cc8; --rB:#8bd45a; --rC:#4a9ae0; --rD:#7a7488;
    --pick:#7b6cf0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,-apple-system,sans-serif;
    line-height:1.5;padding:14px;max-width:960px;margin:0 auto;-webkit-font-smoothing:antialiased}
  header{margin-bottom:12px}
  h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
  .tag{color:var(--sub);font-size:12px;margin-top:3px}

  .gist{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin:14px 0 10px}
  .glabel{font-size:11px;color:var(--faint);letter-spacing:.1em;font-weight:700;margin-bottom:7px}
  .grow{display:flex;gap:7px}
  .grow input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px 12px;border-radius:10px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .grow input:focus{outline:none;border-color:var(--amber)}
  .grow .act{flex:none;min-width:80px}
  .gnote{font-size:11.5px;color:var(--faint);margin-top:8px}
  .gnote.err{color:#e08a8a}.gnote.ok{color:var(--rB)}
  #loader.hidden{display:none}

  .steps{display:flex;gap:6px;margin:14px 0 10px}
  .step{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--sub);
    padding:9px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
  .step.on{background:var(--panel2);border-color:var(--amber);color:var(--amber)}
  .step .n{display:block;font-size:10px;font-weight:500;color:var(--faint);margin-top:1px}
  .step.on .n{color:var(--sub)}

  .controls{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:12px}
  .crow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .crow+.crow{margin-top:8px}
  .clabel{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.08em;margin-right:2px;align-self:center}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    padding:5px 10px;border-radius:20px;font-size:11.5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip.on{border-color:var(--amber);color:var(--amber)}
  .chip.g.on{border-color:var(--pick);color:#b9aef5}
  .count{margin-left:auto;font-size:11.5px;color:var(--faint);white-space:nowrap;align-self:center}

  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .tile{background:var(--panel);border:2px solid transparent;border-radius:10px;overflow:hidden;
    cursor:pointer;transition:.12s;position:relative}
  .tile:hover{border-color:var(--line)}
  .tile.picked{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick)}
  .tile .media{position:relative;aspect-ratio:460/215;background:var(--panel2)}
  .tile .media img{width:100%;height:100%;object-fit:cover;display:block}
  .tile .media video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
  .tile .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:34px;height:34px;border-radius:50%;background:rgba(18,16,26,.7);border:1.5px solid rgba(255,255,255,.5);
    display:flex;align-items:center;justify-content:center;pointer-events:none}
  .tile .play::after{content:"";border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px}
  .tile .body{padding:7px 8px 8px}
  .tile .nm{font-size:12px;font-weight:700;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
  .tile .fx{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .fx span{font-size:9.5px;padding:1px 5px;border-radius:4px;background:var(--panel2);color:var(--faint)}
  .fx .indie{color:var(--amber)}.fx .demo{color:var(--rB);border:1px solid var(--rB)}.fx .solo{color:var(--rB)}
  .tile .check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
    background:rgba(18,16,26,.85);border:1.5px solid var(--line);display:flex;align-items:center;
    justify-content:center;font-size:12px;color:transparent;z-index:2}
  .tile.picked .check{background:var(--pick);border-color:var(--pick);color:#fff}
  .tile .rk{position:absolute;top:6px;left:6px;font-size:10px;font-weight:800;color:#12101a;
    padding:1px 6px;border-radius:5px;display:none;z-index:2}
  .tile.ranked .rk{display:block}

  .ranks{display:flex;gap:4px;padding:0 8px 9px}
  .rb{flex:1;padding:6px 0;border-radius:7px;border:1px solid var(--line);background:var(--panel2);
    color:var(--sub);font-size:12px;font-weight:800;cursor:pointer;transition:.1s}
  .rb.on{color:#12101a}
  .tsteam{padding:0 8px 9px;font-size:11px}
  .tsteam a{color:#8fb8e8;text-decoration:none}

  .acts{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap}
  .act{flex:1;min-width:130px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .act:hover{border-color:var(--amber);color:var(--amber)}
  .act.pri{background:var(--amber);color:#1a140a;border-color:var(--amber)}
  .act.pri:hover{filter:brightness(1.08);color:#1a140a}
  .hint{font-size:11.5px;color:var(--faint);margin-top:5px}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:32px 0}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span>ゲーム選定ツール</h1>
  <div class="tag">① 画像で拾う → ② 動画で決める。ランクの一番高い1本が今週の候補。</div>
</header>

<div id="loader">
  <div class="gist">
    <div class="glabel">Gist ID</div>
    <div class="grow">
      <input id="gid" type="text" placeholder="スクリプトが表示したIDを貼り付け" autocomplete="off" spellcheck="false">
      <button class="act pri" id="load">更新</button>
    </div>
    <div class="gnote" id="gnote">一度貼れば記憶します。以後は「更新」を押すだけです。</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="steps">
    <button class="step on" data-step="1">① 画像で拾う<span class="n" id="n1">0本</span></button>
    <button class="step" data-step="2">② 動画で決める<span class="n" id="n2">0本</span></button>
  </div>

  <div class="controls">
    <div class="crow" id="filters">
      <span class="clabel">絞込</span>
      <button class="chip on" data-f="all">すべて</button>
      <button class="chip" data-f="demo">体験版</button>
      <button class="chip" data-f="indie">個人開発</button>
      <button class="chip" data-f="solo">ソロ可</button>
      <button class="chip" data-f="soon">発売前</button>
      <button class="chip" data-f="video">動画あり</button>
    </div>
    <div class="crow" id="genres"><span class="clabel">ジャンル</span></div>
    <div class="crow">
      <span class="clabel">並び</span>
      <button class="chip sort on" data-s="default">おすすめ順</button>
      <button class="chip sort" data-s="date">発売日</button>
      <button class="chip sort" data-s="rev">レビュー少</button>
      <button class="chip sort" data-s="price">価格</button>
      <button class="chip sort" data-s="rank">ランク</button>
      <span class="count" id="count"></span>
    </div>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="acts">
    <button class="act pri" id="ics">⤓ ランク付けを .ics で書き出す</button>
    <button class="act" id="reload">最新を読み直す</button>
    <button class="act" id="clear">判定をリセット</button>
  </div>
  <div class="hint">判定はこのブラウザに保存されます。②で動画をタップすると再生、S〜Dでランク付け。</div>
</div>

<script>
const RANKS = {S:"var(--rS)", A:"var(--rA)", B:"var(--rB)", C:"var(--rC)", D:"var(--rD)"};
const ORDER = {S:5, A:4, B:3, C:2, D:1};
const KEY = "yuwasu_game_picks_v2";
const GKEY = "yuwasu_gist_id";

let GAMES = [];
let state = load();
let step = 1, filter = "all", genre = "all", sort = "default";

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function st(id){ if(!state[id]) state[id] = {picked:false, rank:null}; return state[id]; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- Gist ---------- */
const gid = document.getElementById("gid");
const gnote = document.getElementById("gnote");
gid.value = localStorage.getItem(GKEY) || "";
function note(msg, cls){ gnote.textContent = msg; gnote.className = "gnote" + (cls?" "+cls:""); }

document.getElementById("load").onclick = async () => {
  const id = gid.value.trim();
  if(!id){ note("Gist IDを貼り付けてください。", "err"); return; }
  note("読み込んでいます…");
  try{
    const r = await fetch("https://api.github.com/gists/" + encodeURIComponent(id), {
      headers: {"Accept":"application/vnd.github+json"} });
    if(!r.ok) throw new Error("応答 " + r.status + (r.status===404?"（IDが違うか、Gistがありません）":""));
    const meta = await r.json();
    const file = meta.files && meta.files["games.json"];
    if(!file) throw new Error("games.json が見つかりません");
    let text = file.content;
    if(file.truncated){ const r2 = await fetch(file.raw_url); text = await r2.text(); }
    const d = JSON.parse(text);
    GAMES = d.games || [];
    if(!GAMES.length) throw new Error("データが空です");
    localStorage.setItem(GKEY, id);
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("app").style.display = "block";
    buildGenres();
    render();
  }catch(err){ note("読み込めませんでした: " + err.message, "err"); }
};
if(gid.value.trim()) document.getElementById("load").click();

/* ---------- タブ・絞り込み・並び ---------- */
document.querySelectorAll(".step").forEach(b => {
  b.onclick = () => { step = +b.dataset.step;
    document.querySelectorAll(".step").forEach(x => x.classList.toggle("on", x===b)); render(); };
});
document.querySelectorAll("#filters .chip").forEach(c => {
  c.onclick = () => { filter = c.dataset.f;
    document.querySelectorAll("#filters .chip").forEach(x => x.classList.toggle("on", x===c)); render(); };
});
document.querySelectorAll(".sort").forEach(c => {
  c.onclick = () => { sort = c.dataset.s;
    document.querySelectorAll(".sort").forEach(x => x.classList.toggle("on", x===c)); render(); };
});

function buildGenres(){
  const counts = {};
  GAMES.forEach(g => (g.genres||[]).forEach(x => counts[x] = (counts[x]||0)+1));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>x[0]);
  const box = document.getElementById("genres");
  box.querySelectorAll(".chip").forEach(x=>x.remove());
  const mk = (val,label) => {
    const b = document.createElement("button");
    b.className = "chip g" + (val==="all"?" on":""); b.dataset.g = val; b.textContent = label;
    b.onclick = () => { genre = val;
      box.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on", x===b)); render(); };
    box.appendChild(b);
  };
  mk("all","すべて"); top.forEach(x=>mk(x,x));
}

/* ---------- 絞り込みロジック ---------- */
function passFilter(g){
  if(filter==="demo" && !g.demo) return false;
  if(filter==="indie" && !g.self_published) return false;
  if(filter==="solo" && !g.solo) return false;
  if(filter==="soon" && !g.coming_soon) return false;
  if(filter==="video" && !g.trailer) return false;
  if(genre!=="all" && !(g.genres||[]).includes(genre)) return false;
  return true;
}
function sortList(list){
  const s = sort;
  const arr = [...list];
  if(s==="date") arr.sort((a,b)=>(b.release_date||"0")<(a.release_date||"0")?-1:1);
  else if(s==="rev") arr.sort((a,b)=>(a.recommendations||0)-(b.recommendations||0));
  else if(s==="price") arr.sort((a,b)=>(a.price||0)-(b.price||0));
  else if(s==="rank") arr.sort((a,b)=>(ORDER[st(b.appid).rank]||0)-(ORDER[st(a.appid).rank]||0));
  // default はスクリプトの並び順のまま
  return arr;
}

/* ---------- 描画 ---------- */
function render(){
  const picked = GAMES.filter(g => st(g.appid).picked);
  document.getElementById("n1").textContent = GAMES.length + "本";
  document.getElementById("n2").textContent = picked.length + "本";

  const base = step===1 ? GAMES : picked;
  const list = sortList(base.filter(passFilter));
  document.getElementById("count").textContent = list.length + " / " + base.length + "本";

  const box = document.getElementById("tiles");
  if(!list.length){
    box.innerHTML = '<div class="empty">' +
      (step===2 && !picked.length ? '①で気になったタイルをタップして拾ってください。' : '該当なし') + '</div>';
    return;
  }
  box.innerHTML = list.map(g => tileHTML(g, step===2)).join("");
  bindTiles(step===2);
}

function tileHTML(g, detail){
  const s = st(g.appid);
  const cls = ["tile"];
  if(s.picked) cls.push("picked");
  if(s.rank) cls.push("ranked");
  const rk = '<span class="rk"' + (s.rank?' style="background:'+RANKS[s.rank]+'"':'') + '>' + (s.rank||"") + '</span>';
  const poster = g.thumb || g.header || "";
  // ②で動画ありなら、data属性に持たせてタップで差し替え
  const media = '<div class="media" data-trailer="' + esc(detail && g.trailer ? g.trailer : "") + '" data-type="' + esc(g.trailer_type||"") + '">' +
    '<img src="' + esc(g.header||poster) + '" loading="lazy" onerror="this.style.opacity=.15">' +
    (detail && g.trailer ? '<div class="play"></div>' : '') + '</div>';
  const fx = [];
  if(g.self_published) fx.push('<span class="indie">個人</span>');
  if(g.demo) fx.push('<span class="demo">体験版</span>');
  if(g.solo) fx.push('<span class="solo">ソロ</span>');
  if(g.trailer) fx.push('<span>▶動画</span>');
  fx.push('<span>Rev' + (g.recommendations||0) + '</span>');
  fx.push('<span>' + esc(g.price_text) + '</span>');
  fx.push('<span>' + (g.coming_soon?"発売前":(g.release_date||"?")) + '</span>');
  let extra = "";
  if(detail){
    extra = '<div class="ranks">' +
      Object.keys(RANKS).map(r => '<button class="rb' + (s.rank===r?' on':'') + '" data-id="' + g.appid + '" data-r="' + r + '"' +
        (s.rank===r?' style="background:'+RANKS[r]+';border-color:'+RANKS[r]+'"':'') + '>' + r + '</button>').join("") +
      '</div>' +
      '<div class="tsteam"><a href="' + esc(g.url) + '" target="_blank" rel="noopener">Steamで見る ↗</a></div>';
  }
  return '<div class="' + cls.join(' ') + '" data-id="' + g.appid + '">' +
    media + rk + '<div class="check">✓</div>' +
    '<div class="body"><div class="nm">' + esc(g.name) + '</div><div class="fx">' + fx.join("") + '</div></div>' +
    extra + '</div>';
}

function bindTiles(detail){
  const box = document.getElementById("tiles");
  if(detail){
    // メディアをタップ → 動画再生。ランクボタンは別処理
    box.querySelectorAll(".media").forEach(m => {
      m.onclick = (e) => {
        e.stopPropagation();
        const url = m.getAttribute("data-trailer");
        if(!url || m.querySelector("video")) return;
        const type = m.getAttribute("data-type");
        const v = document.createElement("video");
        v.src = url; v.controls = true; v.autoplay = true; v.playsInline = true;
        v.setAttribute("webkit-playsinline","");
        m.innerHTML = ""; m.appendChild(v);
      };
    });
    box.querySelectorAll(".rb").forEach(b => {
      b.onclick = (e) => { e.stopPropagation();
        const s = st(b.dataset.id); s.rank = (s.rank===b.dataset.r)?null:b.dataset.r; save(); render(); };
    });
  } else {
    // ①はタイル全体でピック
    box.querySelectorAll(".tile").forEach(t => {
      t.onclick = () => { const s = st(t.dataset.id); s.picked = !s.picked; if(!s.picked) s.rank=null; save(); render(); };
    });
  }
}

/* ---------- 書き出し・その他 ---------- */
document.getElementById("ics").onclick = () => {
  const ranked = GAMES.filter(g => st(g.appid).rank);
  if(!ranked.length){ alert("ランクを付けたゲームがありません。"); return; }
  const pad = n => String(n).padStart(2,"0");
  const now = new Date();
  const stamp = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"T000000Z";
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//yuwasu//game-picks//JA\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:ゲーム候補\r\n";
  ranked.sort((a,b)=>(ORDER[st(b.appid).rank])-(ORDER[st(a.appid).rank])).forEach(g => {
    if(!g.release_date) return;
    const d = g.release_date.replace(/-/g,"");
    const nx = new Date(g.release_date+"T00:00:00"); nx.setDate(nx.getDate()+1);
    const de = nx.getFullYear()+pad(nx.getMonth()+1)+pad(nx.getDate());
    const r = st(g.appid).rank;
    const desc = ["相性ランク: "+r,"発売日: "+g.release_date,"価格: "+g.price_text,
      "体験版: "+(g.demo?"あり":"なし"),
      "プレイ人数: "+[g.solo?"ソロ可":"",g.coop?"協力":"",g.multi?"マルチ":""].filter(Boolean).join("/"),
      "開発: "+(g.developers||[]).join(", "),"レビュー数: "+(g.recommendations||0),
      "Steam: "+g.url].join("\\n");
    ics += "BEGIN:VEVENT\r\nUID:steam-"+g.appid+"@yuwasu\r\nDTSTAMP:"+stamp+"\r\n";
    ics += "DTSTART;VALUE=DATE:"+d+"\r\nDTEND;VALUE=DATE:"+de+"\r\n";
    ics += "SUMMARY:【"+r+"】"+g.name.replace(/[,;\\]/g,m=>"\\"+m)+"\r\n";
    ics += "DESCRIPTION:"+desc.replace(/[,;]/g,m=>"\\"+m)+"\r\nEND:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics],{type:"text/calendar;charset=utf-8"}));
  a.download = "game_picks.ics"; document.body.appendChild(a); a.click(); a.remove();
};
document.getElementById("reload").onclick = () => {
  document.getElementById("loader").classList.remove("hidden");
  document.getElementById("app").style.display = "none";
  note("Gist IDを確認して「更新」を押してください。");
};
document.getElementById("clear").onclick = () => {
  if(!confirm("付けた判定をすべて消します。よろしいですか。")) return;
  state = {}; save(); render();
};
</script>
</body>
</html>
